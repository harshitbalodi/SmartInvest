version: '3.8'
services:
  app:
    build: .
    ports:
    - 8000:8000
    volumes:
    - ./:/app
    environment:
    - DATABASE_URL=${DATABASE_URL}
    - CELERY_BROKER_URL=${CELERY_BROKER_URL}
    - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
    depends_on:
    - postgres
    - redis
  celery_worker:
    build: .
    command: celery -A tasks.celery_app worker --loglevel=info
    volumes:
    - ./:/app
    environment:
    - DATABASE_URL=${DATABASE_URL}
    - CELERY_BROKER_URL=${CELERY_BROKER_URL}
    - CELERY_RESULT_BACKEND=${CELERY_RESULT_BACKEND}
    depends_on:
    - postgres
    - redis
  postgres:
    image: postgres:15
    ports:
    - 5432:5432
    environment:
    - POSTGRES_USER=postgres
    - POSTGRES_PASSWORD=postgres
    - POSTGRES_DB=app
    volumes:
    - postgres_data:/var/lib/postgresql/data
  redis:
    image: redis:7
    ports:
    - 6379:6379
volumes:
  postgres_data:
    driver: local
